# =============================================================================
# Prometheus + Grafana — kube-prometheus-stack Helm Values
# =============================================================================
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace -f prometheus-values.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Prometheus
# ---------------------------------------------------------------------------
prometheus:
  prometheusSpec:
    # Retention
    retention: 15d
    retentionSize: "10GB"

    # Resource limits
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

    # Persistent storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Scrape any pods with prometheus.io annotations
    additionalScrapeConfigs:
      - job_name: "ml-platform-pods"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - ml-platform
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

# ---------------------------------------------------------------------------
# Grafana
# ---------------------------------------------------------------------------
grafana:
  enabled: true

  adminPassword: "admin"  # Change in production — use a Kubernetes Secret

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    size: 10Gi

  # Auto-provision the ML Platform dashboard
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: ml-platform
          orgId: 1
          folder: "ML Platform"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/ml-platform

  dashboardsConfigMaps:
    ml-platform: "ml-platform-dashboard"

  # Default data source
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-kube-prometheus-prometheus:9090
          access: proxy
          isDefault: true

  service:
    type: LoadBalancer

# ---------------------------------------------------------------------------
# Alertmanager
# ---------------------------------------------------------------------------
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ---------------------------------------------------------------------------
# Node Exporter & kube-state-metrics
# ---------------------------------------------------------------------------
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
